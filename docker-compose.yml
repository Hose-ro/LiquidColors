services:
  app:
    container_name: laravel-app
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/var/www/app
    working_dir: /var/www/app
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  mysql:
    container_name: mysql-db
    image: mysql:8.0
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in root .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Set MYSQL_DATABASE in root .env}
      MYSQL_USER: ${MYSQL_USER:?Set MYSQL_USER in root .env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in root .env}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
